<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGAFILM - Home</title>
    <link rel="stylesheet" href="main_style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <img src="logo.jpg" alt="MEGAFILM Logo">
        </div>
        <nav class="nav">
            <a href="#" class="active">Home</a>
            <a href="movie-detail.html">Movies & Shows</a>
            <a href="#">Support</a>
            <a href="subscription.html">Subscriptions</a>
        </nav>
        
        <!-- Sửa thành thanh tìm kiếm giống movie-detail.html -->
        <div class="search-container">
            <button class="history-btn">
                <span class="history-icon">🔍</span>
                History
            </button>
        </div>
    </header>

    <!-- Main Content - ĐÃ CĂN GIỮA -->
    <main class="main-content">
        <div class="hero-content">
            <h1 class="hero-title">Your Movies World</h1>
            <p class="hero-subtitle">
                Megafilm brings you the ultimate place to enjoy movies and shows anytime, anywhere.
                At Megafilm, you'll find the latest blockbusters, timeless classics, and everything in between.
            </p>
            <div class="button-group">
                <button class="start-watching-btn" onclick="startWatching()">
                    Start Watching Now
                </button>
            </div>
        </div>
    </main>

    <script>
        function startWatching() {
            // Chuyển hướng đến trang đăng nhập
            window.location.href = 'login.html';
        }
        
        // Thêm sự kiện cho nút History (tùy chọn)
        document.addEventListener('DOMContentLoaded', function() {
            const historyBtn = document.querySelector('.history-btn');
            if (historyBtn) {
                historyBtn.addEventListener('click', function() {
                    alert('History feature coming soon!');
                    // window.location.href = 'history.html';
                });
            }
        });
    </script>
</body>
</html>
