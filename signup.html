<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGAFILM - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Logo ở góc trái trên cùng -->
    <div class="logo">
        <img src="logo.jpg" alt="MEGAFILM Logo">
    </div>

    <div class="form-container">
        <h1 class="form-title">Sign Up</h1>
        
        <form id="signupForm">
            <div class="form-group">
                <input type="text" id="accountName" name="accountName" placeholder="Account name" required>
            </div>
            
            <div class="form-group">
                <div class="password-container">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
                </div>
            </div>
            
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Your email" required>
            </div>
            
            <button type="submit" class="btn-primary">CREATE ACCOUNT</button>
        </form>
        
        <div class="form-divider"></div>
        
        <div class="form-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const accountName = document.getElementById('accountName').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            
            if (accountName.length < 3) {
                alert('Ten tai khoan phai co it nhat 3 ki tu');
                return;
            }
            
            if (password.length < 6) {
                alert('Mat khau phai co it nhat 6 ki tu');
                return;
            }
            
            if (!validateEmail(email)) {
                alert('Vui long nhap dia chi email hop le');
                return;
            }
            
            console.log('Account created:', { accountName, email });
            
            // THÔNG BÁO ĐĂNG KÝ THÀNH CÔNG
            alert('Đăng ký tài khoản thành công! Chào mừng bạn đến với MEGAFILM');

            // Chuyển hướng về trang login sau khi đăng ký thành công
            setTimeout(function() {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
</body>
</html>
