<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGAFILM - Log in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Logo ở góc trái trên cùng -->
    <div class="logo">
        <img src="logo.jpg" alt="MEGAFILM Logo">
    </div>

    <div class="form-container">
        <h1 class="form-title">Login</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="accountName" name="accountName" placeholder="Account name" required>
            </div>
            
            <div class="form-group">
                <div class="password-container">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn-primary">Login</button>
        </form>
        
        <div class="form-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const accountName = document.getElementById('accountName').value;
            const password = document.getElementById('password').value;
            
            console.log('Account Name:', accountName);
            
            // THÔNG BÁO ĐĂNG NHẬP THÀNH CÔNG
            alert('Đăng nhập thành công! Chào mừng bạn trở lại MEGAFILM');
            
            // Chuyển hướng về trang movie detail sau khi đăng nhập thành công
            setTimeout(function() {
                window.location.href = 'movie-detail.html';  // ĐÃ THAY ĐỔI
            }, 1500);
        });
    </script>
</body>
</html>
